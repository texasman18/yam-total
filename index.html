<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{margin:0;background:#f0eee9;display:flex;align-items:center;justify-content:center;min-height:100vh}</style>
</head><body>
<div style="width:375px;height:812px;background:#ffffff;font-family:'Inter',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 24px 28px;box-sizing:border-box;position:relative;border-radius:36px;box-shadow:0 1px 3px rgba(0,0,0,.1),0 20px 50px rgba(0,0,0,.14);overflow:hidden">
  <div style="display:flex;flex-direction:column;align-items:center;text-align:center;flex:1">
    <div style="width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#ff385c,#e00b41);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:18px;box-shadow:0 12px 24px rgba(255,56,92,.28)">🚻</div>
    <div style="font-size:11px;font-weight:600;letter-spacing:.14em;color:#6a6a6a;text-transform:uppercase;margin-bottom:14px">Real-Time Toilet Finder</div>
    <h1 style="font-size:28px;font-weight:700;line-height:1.3;color:#222222;margin:0 0 22px;letter-spacing:-.2px">급할 때<br><span style="color:#ff385c">가장 먼저</span><br>찾는 앱</h1>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      <div style="padding:10px 22px;border-radius:9999px;background:#ff385c;color:#fff;font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(255,56,92,.3)">🇰🇷 한국어</div>
      <div style="padding:10px 22px;border-radius:9999px;background:#f7f7f7;color:#222;font-size:13px;font-weight:600">🇺🇸 English</div>
    </div>
    <div style="width:100%;background:#ff385c;color:#fff;padding:16px 0;border-radius:8px;font-size:16px;font-weight:500;box-shadow:0 8px 20px rgba(255,56,92,.28);margin-bottom:28px">📍 내 주변 화장실 찾기</div>
    <div style="width:100%;text-align:left">
      <div style="font-size:12px;font-weight:600;color:#6a6a6a;margin-bottom:10px">✈️ 해외 여행 중이신가요?</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div style="position:relative;overflow:hidden;background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:16px 12px 14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)">
          <div style="position:absolute;inset:0;font-size:150px;display:flex;align-items:center;justify-content:center;opacity:.22;transform:scale(1.05)">🇯🇵</div>
          <svg style="position:relative;height:52px;width:auto;margin:0 auto 8px;display:block;filter:drop-shadow(0 1px 1px rgba(0,0,0,.18))" viewBox="0 0 400 500"><path d="M255 15c14 0 28 10 34 24 8 18 4 38-8 52-8 9-8 22-20 26-15 5-30-4-34-18-4-13 2-24 2-38 0-16-6-30 4-42 6-7 14-4 22-4z" fill="#ff385c"/><path d="M230 100c-10 30-4 62 6 92 8 24 22 44 20 70-2 22-20 38-34 54-20 24-38 52-64 70-18 13-42 20-62 10-16-8-20-28-14-44 10-26 34-42 52-62 26-28 46-62 58-98 10-30 12-62 20-92 4-14 10-14 18 0z" fill="#ff385c"/><path d="M148 300c14 4 24 18 24 32 0 16-12 30-28 30-15 0-27-13-27-29 0-17 15-37 31-33z" fill="#ff385c"/><path d="M92 350c12 2 21 14 20 27-1 15-14 27-29 25-13-2-22-15-20-28 2-14 16-26 29-24z" fill="#ff385c"/><path d="M120 130c22-8 48 2 58 24 9 20 2 44-16 56-20 13-46 8-58-12-13-20-6-56 16-68z" fill="#ff385c" opacity="0.85"/></svg>
          <div style="position:relative;font-size:13px;font-weight:600;color:#222">🇯🇵 일본</div>
        </div>
        <div style="position:relative;overflow:hidden;background:#fff;border:1px solid #ebebeb;border-radius:14px;padding:16px 12px 14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)">
          <div style="position:absolute;inset:0;font-size:150px;display:flex;align-items:center;justify-content:center;opacity:.22;transform:scale(1.05)">🇹🇼</div>
          <svg style="position:relative;height:52px;width:auto;margin:0 auto 8px;display:block;filter:drop-shadow(0 1px 1px rgba(0,0,0,.18))" viewBox="0 0 260 420"><path d="M150 10c18 2 30 18 36 34 10 26 8 56 2 84-8 40-24 78-40 116-12 30-22 62-40 90-10 16-26 34-44 30-16-4-22-24-20-40 6-34 22-66 34-98 18-48 30-98 36-148 4-24 2-50 12-72 4-10 12-8 24 4z" fill="#ff385c"/><path d="M100 130c8-4 18 0 22 8 4 9 0 20-9 24-9 4-19 0-23-9-4-8 1-19 10-23z" fill="#ff385c" opacity="0.7"/></svg>
          <div style="position:relative;font-size:13px;font-weight:600;color:#222">🇹🇼 대만</div>
        </div>
      </div>
    </div>
  </div>
  <div style="text-align:center;font-size:12px;color:#929292">Powered by 테크셀</div>
</div>
</body></html>
